version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg16-latest
    environment:
      POSTGRES_USER: sim_user
      POSTGRES_PASSWORD: sim_pass
      POSTGRES_DB: missile_sim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim_user -d missile_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sim_user:sim_pass@db:5432/missile_sim
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
